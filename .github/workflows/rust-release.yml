# Simplified release workflow for @cc-claw/codex fork.
# To release:
#   git tag -a rust-v0.1.0 -m "Release 0.1.0"
#   git push origin rust-v0.1.0
name: rust-release
on:
  push:
    tags:
      - "rust-v*.*.*"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "Not a tag push"; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^rust-v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
            || { echo "Tag '${GITHUB_REF_NAME}' doesn't match expected format"; exit 1; }
          tag_ver="${GITHUB_REF_NAME#rust-v}"
          cargo_ver_raw="$(grep -m1 "^version" codex-rs/Cargo.toml || echo 'version = \"MISSING\"')"
          cargo_ver="$(echo "$cargo_ver_raw" | sed -E "s/version[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/")"
          echo "DEBUG: GITHUB_REF_TYPE=$GITHUB_REF_TYPE"
          echo "DEBUG: GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "DEBUG: tag_ver=$tag_ver"
          echo "DEBUG: cargo_ver=$cargo_ver"
          [[ "${tag_ver}" == "${cargo_ver}" ]] \
            || echo "WARN: Tag=$tag_ver != Cargo=$cargo_ver (continuing anyway)"
          echo "Tag and Cargo.toml agree (${tag_ver})"

  build-linux:
    needs: tag-check
    name: Build - Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          cargo build --release --bin codex --bin codex-responses-api-proxy
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binaries
          path: |
            codex-rs/target/release/codex
            codex-rs/target/release/codex-responses-api-proxy

  build-windows:
    needs: tag-check
    name: Build - Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        shell: bash
        run: |
          cargo build --target x86_64-pc-windows-msvc --release --bin codex --bin codex-responses-api-proxy
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-binaries
          path: |
            codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
            codex-rs/target/x86_64-pc-windows-msvc/release/codex-responses-api-proxy.exe

  release:
    needs:
      - build-linux
      - build-windows
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.ver }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*-x64-binaries"
          merge-multiple: false

      - name: Extract version
        id: version
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          echo "ver=$ver" >> $GITHUB_OUTPUT
          echo "Tag version: $ver"

      - name: Prepare npm tarballs
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm

          # Each platform: copy binaries + npm pack
          for entry in linux-x64-binaries win32-x64-binaries; do
            [ ! -d "$entry" ] && continue
            case "$entry" in
              linux-x64-binaries) pkg_name="codex-linux-x64" platform="linux" arch="x64" ;;
              win32-x64-binaries) pkg_name="codex-win32-x64" platform="win32" arch="x64" ;;
            esac

            pkg_path="dist/npm-tmp/${pkg_name}"
            mkdir -p "${pkg_path}/bin"
            cp "${entry}/codex" "${pkg_path}/bin/" 2>/dev/null || cp "${entry}/codex.exe" "${pkg_path}/bin/" 2>/dev/null || true
            [ -f "${entry}/codex-responses-api-proxy" ] && cp "${entry}/codex-responses-api-proxy" "${pkg_path}/bin/" || true
            [ -f "${entry}/codex-responses-api-proxy.exe" ] && cp "${entry}/codex-responses-api-proxy.exe" "${pkg_path}/bin/" || true

            cat > "${pkg_path}/package.json" <<PKGJSON
{
  "name": "@cc-claw/codex-${platform}-${arch}",
  "version": "${VERSION}",
  "description": "Codex CLI native binary for ${platform}-${arch}",
  "license": "Apache-2.0",
  "os": ["${platform}"],
  "cpu": ["${arch}"],
  "type": "module",
  "engines": {
    "node": ">=16"
  },
  "files": ["bin"],
  "bin": {
    "codex": "bin/codex"
  }
}
PKGJSON
            cd "${pkg_path}"
            npm pack --pack-destination "${GITHUB_WORKSPACE}/dist/npm"
            cd "${GITHUB_WORKSPACE}"
          done

      - name: Create main package
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm-tmp/codex-main/bin
          cp codex-cli/bin/codex.js dist/npm-tmp/codex-main/bin/
          cat > dist/npm-tmp/codex-main/package.json <<PKGJSON
{
  "name": "@cc-claw/codex",
  "version": "${VERSION}",
  "description": "Codex CLI - coding agent (cc-claw fork)",
  "license": "Apache-2.0",
  "bin": {
    "codex": "bin/codex.js"
  },
  "type": "module",
  "engines": {
    "node": ">=16"
  },
  "files": [
    "bin"
  ],
  "optionalDependencies": {
    "@cc-claw/codex-linux-x64": "${VERSION}",
    "@cc-claw/codex-win32-x64": "${VERSION}"
  }
}
PKGJSON
          cd dist/npm-tmp/codex-main
          npm pack --pack-destination "${GITHUB_WORKSPACE}/dist/npm"

      - name: Upload npm tarballs as release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.ver }}
          tag_name: ${{ github.ref_name }}
          files: dist/npm/*.tgz

      - name: Upload npm tarballs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: dist/npm/*.tgz
          retention-days: 5

  publish-npm:
    needs: release
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download npm tarballs from artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: dist/npm

      - name: Publish platform packages first
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd dist/npm
          for f in @cc-claw-codex-linux*.tgz @cc-claw-codex-win32*.tgz; do
            [ -f "$f" ] || continue
            echo "Publishing $f..."
            npm publish "$f" --access public 2>&1 || echo "Skipped: $f may already exist"
          done

      - name: Publish main package
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd dist/npm
          main_pkg=$(ls @cc-claw-codex-0*.tgz 2>/dev/null | head -1)
          if [ -n "$main_pkg" ]; then
            echo "Publishing main: $main_pkg"
            npm publish "$main_pkg" --access public 2>&1 || echo "Skipped: main may already exist"
          else
            echo "No main package tgz found"
          fi
