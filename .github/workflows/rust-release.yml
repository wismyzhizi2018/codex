# Simplified release workflow for @cc-claw/codex fork.
# To release:
#   git tag -a rust-v0.1.0 -m "Release 0.1.0"
#   git push origin rust-v0.1.0
name: rust-release
on:
  push:
    tags:
      - "rust-v*.*.*"
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "Not a tag push"; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^rust-v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
            || { echo "Tag '${GITHUB_REF_NAME}' doesn't match expected format"; exit 1; }
          tag_ver="${GITHUB_REF_NAME#rust-v}"
          cargo_ver_raw="$(grep -m1 "^version" codex-rs/Cargo.toml || echo 'version = "MISSING"')"
          cargo_ver="$(echo "$cargo_ver_raw" | sed -E "s/version[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/")"
          echo "DEBUG: GITHUB_REF_TYPE=$GITHUB_REF_TYPE"
          echo "DEBUG: GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "DEBUG: tag_ver=$tag_ver"
          echo "DEBUG: cargo_ver=$cargo_ver"
          [[ "${tag_ver}" == "${cargo_ver}" ]] \
            || echo "WARN: Tag=$tag_ver != Cargo=$cargo_ver (continuing anyway)"
          echo "Tag and Cargo.toml agree (${tag_ver})"
  build-linux:
    needs: tag-check
    name: Build - Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          cargo build --release --bin codex --bin codex-responses-api-proxy
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binaries
          path: |
            codex-rs/target/release/codex
            codex-rs/target/release/codex-responses-api-proxy
  build-darwin:
    needs: tag-check
    name: Build - macOS ${{ matrix.target }}
    runs-on: macos-15-xlarge
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_name: darwin-arm64-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: |
          cargo build --target ${{ matrix.target }} --release --bin codex --bin codex-responses-api-proxy
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            codex-rs/target/${{ matrix.target }}/release/codex
            codex-rs/target/${{ matrix.target }}/release/codex-responses-api-proxy
  build-windows:
    needs: tag-check
    name: Build - Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        shell: bash
        run: |
          cargo build --target x86_64-pc-windows-msvc --release --bin codex --bin codex-responses-api-proxy
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-binaries
          path: |
            codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
            codex-rs/target/x86_64-pc-windows-msvc/release/codex-responses-api-proxy.exe
  release:
    needs:
      - build-linux
      - build-darwin
      - build-windows
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/binaries
      - name: List artifacts
        run: ls -R dist/binaries/
      - name: Determine version
        id: version
        run: |
          version="${GITHUB_REF_NAME#rust-v}"
          echo "ver=${version}" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create platform npm packages
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm
          create_platform_pkg() {
            local pkg_name="$1"
            local pkg_dir="$2"
            local os="$3"
            local cpu="$4"
            local pkg_path="dist/npm-tmp/${pkg_name}"
            mkdir -p "${pkg_path}/vendor"
            cp -r "${pkg_dir}/"* "${pkg_path}/vendor/" 2>/dev/null || true
            cat > "${pkg_path}/package.json" <<PKGJSON
          {
            "name": "@cc-claw/${pkg_name}",
            "version": "${VERSION}",
            "description": "Platform-specific binary for @cc-claw/codex",
            "license": "Apache-2.0",
            "os": ["${os}"],
            "cpu": ["${cpu}"],
            "files": ["vendor"]
          }
          PKGJSON
            cd "${pkg_path}"
            npm pack --pack-destination "${GITHUB_WORKSPACE}/dist/npm"
            cd "${GITHUB_WORKSPACE}"
          }
          create_platform_pkg "codex-linux-x64" "dist/binaries/linux-x64-binaries" "linux" "x64"
          create_platform_pkg "codex-darwin-arm64" "dist/binaries/darwin-arm64-binaries" "darwin" "arm64"
          create_platform_pkg "codex-win32-x64" "dist/binaries/win32-x64-binaries" "win32" "x64"
      - name: Create main package
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm-tmp/codex-main/bin
          cp codex-cli/bin/codex.js dist/npm-tmp/codex-main/bin/
          cat > dist/npm-tmp/codex-main/package.json <<PKGJSON
          {
            "name": "@cc-claw/codex",
            "version": "${VERSION}",
            "description": "Codex CLI - coding agent (cc-claw fork)",
            "license": "Apache-2.0",
            "bin": {
              "codex": "bin/codex.js"
            },
            "type": "module",
            "engines": {
              "node": ">=16"
            },
            "files": [
              "bin"
            ],
            "optionalDependencies": {
              "@cc-claw/codex-linux-x64": "${VERSION}",
              "@cc-claw/codex-darwin-arm64": "${VERSION}",
              "@cc-claw/codex-win32-x64": "${VERSION}"
            }
          }
          PKGJSON
          cd dist/npm-tmp/codex-main
          npm pack --pack-destination "${GITHUB_WORKSPACE}/dist/npm"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.ver }}
          tag_name: ${{ github.ref_name }}
          files: dist/npm/*
  publish-npm:
    needs: release
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Download npm tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist/npm
          gh release download "$RELEASE_TAG" --pattern "*.tgz" --dir dist/npm
      - name: Publish platform packages first
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for f in dist/npm/@cc-claw-codex-*.tgz; do
            echo "Publishing $(basename $f)..."
            npm publish "$f" --access public || echo "Skipped (may already exist)"
          done
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "Publishing main package..."
          npm publish dist/npm/cc-claw-codex-*.tgz --access public || echo "Skipped (may already exist)"
