name: npm-publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.23)"
        required: true
        default: "0.1.23"

jobs:
  publish:
    name: Publish @cc-claw/codex v${{ inputs.version }} to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download npm tarballs from GitHub release
        run: |
          mkdir -p dist/npm
          gh release download "rust-v0.1.23" \
            --pattern "*.tgz" \
            --dir dist/npm \
            --skip-existing
          ls -la dist/npm/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform packages
        run: |
          set -euo pipefail
          cd dist/npm
          for f in @cc-claw-codex-linux*.tgz @cc-claw-codex-win32*.tgz; do
            [ -f "$f" ] || continue
            echo "Publishing $f..."
            npm publish "$f" --access public 2>&1 || echo "Skipped: $f"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          set -euo pipefail
          cd dist/npm
          main_pkg=$(ls @cc-claw-codex-0*.tgz 2>/dev/null | head -1)
          if [ -n "$main_pkg" ]; then
            echo "Publishing main: $main_pkg"
            npm publish "$main_pkg" --access public 2>&1 || echo "Skipped: main"
          else
            echo "No main package tgz found"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
